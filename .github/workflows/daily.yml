name: Daily Starlight digest

on:
  schedule:
    - cron: "12 10 * * *"     # 10:12 UTC = 3:12 AM PDT / 2:12 AM PST
  workflow_dispatch:
    inputs:
      test_email:
        description: "Override EMAIL_TO for testing (e.g. dfreeman@gmail.com)"
        required: false
        type: string
      since_override:
        description: "Override SINCE date (ISO-8601, e.g. 2026-05-10T00:00:00Z)"
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Compute SINCE timestamp
        id: since
        env:
          GH_TOKEN: ${{ github.token }}
          SINCE_OVERRIDE: ${{ inputs.since_override }}
        run: |
          if [ -n "$SINCE_OVERRIDE" ]; then
            SINCE="$SINCE_OVERRIDE"
          else
            SINCE=$(gh run list --workflow daily.yml --status success --limit 1 \
              --json updatedAt --jq '.[0].updatedAt // empty' 2>/dev/null || true)
            if [ -z "$SINCE" ]; then
              SINCE=$(date -u -d '-7 days' +%Y-%m-%dT%H:%M:%SZ)
            fi
          fi
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "SINCE=$SINCE"

      - name: Run scraper
        env:
          PORTAL_EMAIL:       ${{ secrets.PORTAL_EMAIL }}
          PORTAL_PASSWORD:    ${{ secrets.PORTAL_PASSWORD }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ inputs.test_email || secrets.EMAIL_TO }}
          SINCE:              ${{ steps.since.outputs.since }}
        run: python scraper.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 14
